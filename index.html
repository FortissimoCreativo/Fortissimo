<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Fortissimo</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: #0e1116;
    overflow-x: hidden;
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                url("fortissimo.png");
    background-size: cover;
    background-position: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

h1 {
    font-size: 80px;
    letter-spacing: 6px;
    margin-bottom: 20px;
}

.hero p {
    max-width: 650px;
    font-size: 22px;
    opacity: 0.9;
}

/* ANIMACJA */
.fade {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeIn 1s forwards;
}

.fade:nth-child(2) { animation-delay: 0.2s; }
.fade:nth-child(3) { animation-delay: 0.4s; }

@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* BUTTON */
button {
    margin-top: 40px;
    padding: 15px 40px;
    font-size: 16px;
    background: #e0a03b;
    border: none;
    color: black;
    cursor: pointer;
    border-radius: 50px;
    transition: 0.3s;
}

button:hover {
    background: #ffbf5c;
    transform: scale(1.05);
}

/* SEKCJE */
section {
    padding: 100px 20px;
    text-align: center;
}

section h2 {
    font-size: 36px;
    margin-bottom: 20px;
}

section p {
    max-width: 600px;
    margin: 15px auto;
    line-height: 1.7;
}

/* LISTA */
ul {
    list-style: none;
    padding: 0;
    max-width: 600px;
    margin: 20px auto;
    font-size: 18px;
}

ul li {
    margin: 10px 0;
    opacity: 0.8;
}

/* SEKCJE KOLORY */
.white {
    background: white;
    color: black;
}

.dark {
    background: #2d3e4f;
}

/* PORTFOLIO */
.portfolio {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.box {
    background: #1a1f27;
    padding: 20px;
    border-radius: 10px;
}

.box p {
    opacity: 0.7;
}

/* FOOTER */
.footer {
    padding: 60px;
    background: black;
}
</style>

</head>

<body>

<!-- HERO -->
<div class="hero">
    <h1 class="fade">FORTISSIMO</h1>

    <p class="fade">
    Nie piszę tekstów.<br>
    Tworzę przekaz, którego nie da się zignorować.
    </p>

    <p class="fade">
    Manifesty. Copy. Komunikacja, która zostaje w głowie.
    </p>

    <a href="mailto:e-fortissimo@hotmail.com">
        <button class="fade">Napisz do mnie</button>
    </a>
</div>

<!-- KIM JESTEM -->
<section class="white">
    <h2>Kim jestem</h2>
    <p>
    Jestem copywriterem. Tworzę teksty, które przyciągają uwagę
    i nadają markom charakter. Buduję komunikację, która zostaje
    w głowie i działa.
    </p>
</section>

<!-- OFERTA -->
<section class="dark">
