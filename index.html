<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Fortissimo</title>

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0a0c10;
    color: white;
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url("fortissimo.png");
    background-size: cover;
    background-position: center;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.hero-content {
    max-width: 700px;
}

/* TYPOGRAFIA */
h1 {
    font-family: 'Playfair Display', serif;
    font-size: 80px;
    letter-spacing: 6px;
    margin-bottom: 20px;
}

p {
    font-size: 18px;
    line-height: 1.7;
    opacity: 0.8;
}

/* ANIMACJA */
.fade {
    opacity: 0;
    transform: translateY(30px);
    animation: fadeIn 1s forwards;
}

.fade:nth-child(1) { animation-delay: 0.2s; }
.fade:nth-child(2) { animation-delay: 0.4s; }
.fade:nth-child(3) { animation-delay: 0.6s; }

@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* BUTTON */
button {
    margin-top: 40px;
    padding: 15px 40px;
    background: #e0a03b;
    border: none;
    color: black;
    font-size: 16px;
    border-radius: 50px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ffbf5c;
    transform: scale(1.05);
}

    text-align: center;
}
