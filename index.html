<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Fortissimo</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* HERO */
.hero {
    height: 120vh;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url("fortissimo.png");
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.hero-content {
    max-width: 700px;
}

/* TYPOGRAFIA */
h1 {
    font-family: 'Playfair Display', serif;
    font-size: 90px;
    letter-spacing: 8px;
    margin-bottom: 20px;

    opacity: 0;
    animation: fadeHero 1.5s forwards;
}

.hero p {
    font-size: 22px;
    opacity: 0;
    animation: fadeHero 2s forwards;
}

.hero p:nth-child(2) { animation-delay: 0.5s; }
.hero p:nth-child(3) { animation-delay: 1s; }
