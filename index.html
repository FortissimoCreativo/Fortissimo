<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Fortissimo</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: black;
    color: white;
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url("fortissimo.png");
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.hero-content {
    max-width: 700px;
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 80px;
    letter-spacing: 6px;
    margin-bottom: 20px;
}

.hero p {
    font-size: 22px;
    opacity: 0.9;
}

/* ANIMACJA */
.fade {
    opacity: 0;
    transform: translateY(20px);
    animation: fade 1s forwards;
}
.fade:nth-child(2) { animation-delay: 0.3s; }
.fade:nth-child(3) { animation-delay: 0.6s; }

@keyframes fade {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* BUTTON */
button {
    margin-top: 30px;
    padding: 15px 40px;
    border-radius: 40px;
    border: none;
    background: #e0a03b;
    cursor: pointer;
}
button:hover {
    transform: scale(1.1);
    background: #ffbf5c;
}

/* SEKCJE */
section {
    padding: 100px;
    text-align: center;
    opacity: 0;
    transform: translateY(50px);
    transition: 1s;
}
.show {
    opacity: 1;
    transform: translateY(0);
}

.white {
    background: white;
    color: black;
}

.dark {
    background: #12161d;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<div class="hero-content">

<h1 class="fade">FORTISSIMO</h1>

<p class="fade">
Nie piszę tekstów.<br>
Tworzę przekaz, którego nie da się zignorować.
</p>

<p class="fade">
To nie copywriting.<br>
To charakter marki.
</p>

<a href="mailto:e-fortissimo@hotmail.com">
<button class="fade">Napisz do mnie</button>
</a>

</div>
</div>

<!-- SEKCJE -->
<section class="white">
<h2>Kim jestem</h2>
<p>Tworzę komunikację, która zostaje w głowie.</p>
</section>

<section class="dark">
<h2>Dlaczego to działa</h2>
<p>Bo przeciętność nie sprzedaje. Charakter — tak.</p>
</section>

<script>
