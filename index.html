<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Fortissimo</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;
    background: #2d3e4f;
}

.hero {
    height: 100vh;
    background: url("fortissimo.png") center/cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

h1 {
    font-size: 60px;
    margin-bottom: 20px;
}

p {
    font-size: 22px;
    opacity: 0.8;
}

button {
    margin-top: 30px;
    padding: 15px 30px;
    font-size: 16px;
    background: #e0a03b;
    border: none;
    color: black;
    cursor: pointer;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="hero">
    <h1>FORTISSIMO</h1>
    <p>Make some noise</p>
    <button>Kontakt</button>
</div>

</body>
</html>
